services:
  - type: web
    name: ticktick-mcp
    runtime: docker
    plan: free
    autoDeployTrigger: off
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_SSE_PATH
        value: /sse
      - key: MCP_MESSAGE_PATH
        value: /messages/
      - key: TICKTICK_CLIENT_ID
        sync: false
      - key: TICKTICK_CLIENT_SECRET
        sync: false
      - key: TICKTICK_ACCESS_TOKEN
        sync: false
      - key: TICKTICK_REFRESH_TOKEN
        sync: false
      - key: MCP_PUBLIC_URL
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: MCP_ALLOWED_HOSTS
        sync: false
      - key: MCP_ALLOWED_ORIGINS
        sync: false
